name: Build And Publish Package

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-and-publish-package.yml'
      - 'registry/packages/**'
      - 'packaging/**'
      - 'scripts/**'
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      package:
        description: Optional package to build and publish
        required: false
        type: string

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref_name }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream10

    env:
      PACKAGER_REPO_DIR: ${{ github.workspace }}/.tmprepo/el10/x86_64
      PACKAGER_GPG_HOME: ${{ github.workspace }}/.tmprepo/gnupg
      PACKAGER_GPG_PUBLIC_KEY_PATH: ${{ github.workspace }}/.tmprepo/RPM-GPG-KEY-unused

    steps:
      - name: Install base tooling
        run: |
          dnf config-manager --set-enabled crb
          dnf -y install \
            git \
            python3 \
            dnf-plugins-core \
            meson \
            rpm-build \
            rpm-sign \
            rpmdevtools \
            createrepo_c \
            gnupg2 \
            rsync \
            openssh-clients \
            jq \
            util-linux

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure SSH
        env:
          PACKAGER_REMOTE_SSH_KEY: ${{ secrets.PACKAGER_REMOTE_SSH_KEY }}
          PACKAGER_REMOTE_HOST: ${{ secrets.PACKAGER_REMOTE_HOST }}
        run: |
          test -n "$PACKAGER_REMOTE_SSH_KEY"
          test -n "$PACKAGER_REMOTE_HOST"
          mkdir -p /root/.ssh
          chmod 700 /root/.ssh
          printf '%s\n' "$PACKAGER_REMOTE_SSH_KEY" > /root/.ssh/packager_remote
          chmod 600 /root/.ssh/packager_remote
          ssh-keyscan -H "$PACKAGER_REMOTE_HOST" >> /root/.ssh/known_hosts

      - name: Sync remote package state
        env:
          PACKAGER_REMOTE_HOST: ${{ secrets.PACKAGER_REMOTE_HOST }}
          PACKAGER_REMOTE_USER: ${{ secrets.PACKAGER_REMOTE_USER }}
        run: |
          mkdir -p state
          rsync -av -e "ssh -i /root/.ssh/packager_remote -o BatchMode=yes -o StrictHostKeyChecking=accept-new" \
            "${PACKAGER_REMOTE_USER:-cloud-user}@${PACKAGER_REMOTE_HOST}:/opt/packager/state/" \
            state/ || true

      - name: Detect packages to build
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PACKAGE: ${{ github.event.inputs.package }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          chmod +x scripts/packager.py scripts/publish_remote.sh scripts/check_updates.py scripts/remote_smoke_publish.sh scripts/export_smoke_test.py scripts/validate_registry.py scripts/detect_changed_packages.py scripts/finalize_detect.py
          python3 scripts/validate_registry.py
          python3 scripts/check_updates.py > /tmp/update-check.json
          cat /tmp/update-check.json

          if [[ "$EVENT_NAME" == "workflow_dispatch" && -n "$INPUT_PACKAGE" ]]; then
            python3 scripts/finalize_detect.py manual "$INPUT_PACKAGE" >/tmp/final-detect.json
          elif [[ "$EVENT_NAME" == "push" && -n "$BEFORE_SHA" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            python3 scripts/detect_changed_packages.py "$BEFORE_SHA" "$CURRENT_SHA" > /tmp/git-detect.json
            cat /tmp/git-detect.json
            python3 scripts/finalize_detect.py push /tmp/update-check.json /tmp/git-detect.json >/tmp/final-detect.json
          else
            python3 scripts/finalize_detect.py scheduled /tmp/update-check.json >/tmp/final-detect.json
          fi

          cat /tmp/final-detect.json
          python3 -c 'import json, os, pathlib; payload=json.loads(pathlib.Path("/tmp/final-detect.json").read_text()); open(os.environ["GITHUB_OUTPUT"], "a").write(f"has_updates={'\''true'\'' if payload['\''has_updates'\''] else '\''false'\''}\nchanged_names={json.dumps(payload['\''changed_names'\''])}\n")'

      - name: Install ghostty toolchain
        if: ${{ steps.detect.outputs.has_updates == 'true' }}
        run: |
          dnf -y install curl xz tar gzip ninja-build python3-pip
          curl -fsSL https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz -o /tmp/zig.tar.xz
          tar -C /opt -xf /tmp/zig.tar.xz
          ln -sf /opt/zig-x86_64-linux-0.15.2/zig /usr/local/bin/zig
          curl -fsSL https://github.com/jgm/pandoc/releases/download/3.8/pandoc-3.8-linux-amd64.tar.gz -o /tmp/pandoc.tar.gz
          tar -C /tmp -xf /tmp/pandoc.tar.gz
          install -m 0755 /tmp/pandoc-3.8/bin/pandoc /usr/local/bin/pandoc

      - name: Build, smoke test, and publish changed packages
        if: ${{ steps.detect.outputs.has_updates == 'true' }}
        run: |
          mapfile -t PACKAGES < <(python3 - <<'PY'
          import json
          import os

          names = json.loads(os.environ["CHANGED_NAMES"])
          for name in names:
              print(name)
          PY
          )

          for package in "${PACKAGES[@]}"; do
            ./scripts/packager.py build-one "$package" --force
            ./scripts/publish_remote.sh "$package"
          done
        env:
          CHANGED_NAMES: ${{ steps.detect.outputs.changed_names }}

      - name: Collect built RPMs
        if: ${{ steps.detect.outputs.has_updates == 'true' }}
        run: |
          mkdir -p dist
          python3 - <<'PY'
          import json
          import os
          import shutil
          from pathlib import Path

          dist_dir = Path("dist")
          for package in json.loads(os.environ["CHANGED_NAMES"]):
              state_path = Path("state") / f"{package}.json"
              with state_path.open() as f:
                  state = json.load(f)
              rpm_paths = [Path(path) for path in state.get("last_built_rpms", [])]
              if not rpm_paths:
                  raise SystemExit(f"no built RPMs recorded for {package}")
              for rpm_path in rpm_paths:
                  if not rpm_path.exists():
                      raise SystemExit(f"missing built RPM: {rpm_path}")
                  shutil.copy2(rpm_path, dist_dir / rpm_path.name)
          PY
        env:
          CHANGED_NAMES: ${{ steps.detect.outputs.changed_names }}

      - name: Upload RPM artifacts
        if: ${{ steps.detect.outputs.has_updates == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: rpms-auto
          path: dist/*.rpm

      - name: No updates
        if: ${{ steps.detect.outputs.has_updates != 'true' }}
        run: echo "No affected packages detected."
