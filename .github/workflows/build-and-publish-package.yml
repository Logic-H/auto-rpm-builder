name: Build And Publish Package

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-and-publish-package.yml'
      - 'registry/packages/**'
      - 'packaging/**'
      - 'scripts/**'
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      package:
        description: Optional package to build and publish
        required: false
        type: string

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref_name }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream10

    env:
      PACKAGER_REPO_DIR: ${{ github.workspace }}/.tmprepo/el10/x86_64
      PACKAGER_GPG_HOME: ${{ github.workspace }}/.tmprepo/gnupg
      PACKAGER_GPG_PUBLIC_KEY_PATH: ${{ github.workspace }}/.tmprepo/RPM-GPG-KEY-unused
      PACKAGER_PUBLIC_STATE_BASE_URL: http://repo.imhzj.com/custom/state

    steps:
      - name: Install base tooling
        run: |
          dnf config-manager --set-enabled crb
          dnf -y install \
            git \
            python3 \
            dnf-plugins-core \
            meson \
            rpm-build \
            rpm-sign \
            rpmdevtools \
            createrepo_c \
            gnupg2 \
            jq \
            util-linux

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch published package state
        run: |
          chmod +x scripts/fetch_remote_state.py
          ./scripts/fetch_remote_state.py "$PACKAGER_PUBLIC_STATE_BASE_URL" registry/packages state

      - name: Detect packages to build
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PACKAGE: ${{ github.event.inputs.package }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          EVENT_PATH: ${{ github.event_path }}
        run: |
          chmod +x scripts/packager.py scripts/check_updates.py scripts/remote_smoke_publish.sh scripts/export_smoke_test.py scripts/validate_registry.py scripts/detect_changed_packages.py scripts/finalize_detect.py
          python3 scripts/validate_registry.py
          python3 scripts/check_updates.py > /tmp/update-check.json
          cat /tmp/update-check.json

          if [[ "$EVENT_NAME" == "workflow_dispatch" && -n "$INPUT_PACKAGE" ]]; then
            python3 scripts/finalize_detect.py manual "$INPUT_PACKAGE" >/tmp/final-detect.json
          elif [[ "$EVENT_NAME" == "push" && -n "$BEFORE_SHA" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            python3 scripts/detect_changed_packages.py "$EVENT_PATH" > /tmp/git-detect.json
            cat /tmp/git-detect.json
            python3 scripts/finalize_detect.py push /tmp/update-check.json /tmp/git-detect.json >/tmp/final-detect.json
          else
            python3 scripts/finalize_detect.py scheduled /tmp/update-check.json >/tmp/final-detect.json
          fi

          cat /tmp/final-detect.json
          python3 -c 'import json, os, pathlib; payload=json.loads(pathlib.Path("/tmp/final-detect.json").read_text()); open(os.environ["GITHUB_OUTPUT"], "a").write(f"has_updates={'\''true'\'' if payload['\''has_updates'\''] else '\''false'\''}\nchanged_names={json.dumps(payload['\''changed_names'\''])}\n")'

      - name: Install ghostty toolchain
        if: ${{ steps.detect.outputs.has_updates == 'true' }}
        run: |
          dnf -y install curl xz tar gzip ninja-build python3-pip
          curl -fsSL https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz -o /tmp/zig.tar.xz
          tar -C /opt -xf /tmp/zig.tar.xz
          ln -sf /opt/zig-x86_64-linux-0.15.2/zig /usr/local/bin/zig
          curl -fsSL https://github.com/jgm/pandoc/releases/download/3.8/pandoc-3.8-linux-amd64.tar.gz -o /tmp/pandoc.tar.gz
          tar -C /tmp -xf /tmp/pandoc.tar.gz
          install -m 0755 /tmp/pandoc-3.8/bin/pandoc /usr/local/bin/pandoc

      - name: Build changed packages
        if: ${{ steps.detect.outputs.has_updates == 'true' }}
        env:
          CHANGED_NAMES: ${{ steps.detect.outputs.changed_names }}
        run: |
          mapfile -t PACKAGES < <(python3 - <<'PY'
          import json
          import os

          names = json.loads(os.environ["CHANGED_NAMES"])
          for name in names:
              print(name)
          PY
          )

          for package in "${PACKAGES[@]}"; do
            ./scripts/packager.py build-one "$package" --force
          done

      - name: Collect build bundle
        if: ${{ steps.detect.outputs.has_updates == 'true' }}
        run: |
          mkdir -p bundle
          python3 - <<'PY'
          import json
          import os
          import shutil
          from pathlib import Path
          import subprocess

          bundle_dir = Path("bundle")
          for package in json.loads(os.environ["CHANGED_NAMES"]):
              state_path = Path("state") / f"{package}.json"
              with state_path.open() as f:
                  state = json.load(f)
              package_dir = bundle_dir / package
              package_dir.mkdir(parents=True, exist_ok=True)
              rpm_paths = [Path(path) for path in state.get("last_built_rpms", [])]
              if not rpm_paths:
                  raise SystemExit(f"no built RPMs recorded for {package}")
              for rpm_path in rpm_paths:
                  if not rpm_path.exists():
                      raise SystemExit(f"missing built RPM: {rpm_path}")
                  shutil.copy2(rpm_path, package_dir / rpm_path.name)
              shutil.copy2(state_path, package_dir / "state.json")
              subprocess.run(
                  ["python3", "scripts/export_smoke_test.py", package, str(package_dir / "smoke-test.json")],
                  check=True,
              )
          PY
        env:
          CHANGED_NAMES: ${{ steps.detect.outputs.changed_names }}

      - name: Upload build bundle
        if: ${{ steps.detect.outputs.has_updates == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: rpms-el10-${{ github.run_id }}
          path: bundle/

      - name: Notify VPS webhook
        if: ${{ steps.detect.outputs.has_updates == 'true' }}
        env:
          CHANGED_NAMES: ${{ steps.detect.outputs.changed_names }}
          PACKAGER_WEBHOOK_SECRET: ${{ secrets.PACKAGER_WEBHOOK_SECRET }}
          PACKAGER_WEBHOOK_URL: http://repo.imhzj.com/hooks/packager
          ARTIFACT_NAME: rpms-el10-${{ github.run_id }}
        run: |
          test -n "$PACKAGER_WEBHOOK_SECRET"
          python3 - <<'PY' >/tmp/webhook-payload.json
          import json
          import os

          payload = {
              "repository": os.environ["GITHUB_REPOSITORY"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "artifact_name": os.environ["ARTIFACT_NAME"],
              "packages": json.loads(os.environ["CHANGED_NAMES"]),
              "sha": os.environ["GITHUB_SHA"],
              "ref": os.environ["GITHUB_REF"],
          }
          print(json.dumps(payload))
          PY
          python3 - <<'PY' >/tmp/webhook-signature.txt
          import hashlib
          import hmac
          import os
          from pathlib import Path

          body = Path("/tmp/webhook-payload.json").read_bytes()
          secret = os.environ["PACKAGER_WEBHOOK_SECRET"].encode("utf-8")
          print("sha256=" + hmac.new(secret, body, hashlib.sha256).hexdigest())
          PY
          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $(cat /tmp/webhook-signature.txt)" \
            --data-binary @/tmp/webhook-payload.json \
            "$PACKAGER_WEBHOOK_URL"

      - name: No updates
        if: ${{ steps.detect.outputs.has_updates != 'true' }}
        run: echo "No affected packages detected."
